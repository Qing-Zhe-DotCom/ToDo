<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg id="svg-anim-v3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="w-24 h-24 sm:w-28 sm:h-28 drop-shadow-sm">
                        <style>
                            .ring-v3 { stroke-dasharray: 215; stroke-dashoffset: 215; animation: draw-v3 2.5s infinite cubic-bezier(0.65, 0, 0.35, 1); }
                            .check-v3 { transform-origin: 50px 50px; animation: pop-v3 2.5s infinite; }
                            .ripple-v3 { transform-origin: 50px 50px; animation: ripple-v3 2.5s infinite ease-out; }
                            .fade-v3 { animation: fade-v3 2.5s infinite; }
                            @keyframes draw-v3 { 0% { stroke-dashoffset: 215; } 35%, 100% { stroke-dashoffset: 0; } }
                            @keyframes pop-v3 { 0%, 25% { transform: scale(0); opacity: 0; } 30% { transform: scale(0); opacity: 1; } 45% { transform: scale(1.25); opacity: 1; } 55% { transform: scale(0.9); opacity: 1; } 65% { transform: scale(1.05); opacity: 1; } 75%, 100% { transform: scale(1); opacity: 1; } }
                            @keyframes ripple-v3 { 0%, 28% { transform: scale(0.6); opacity: 0; stroke-width: 10; } 35% { transform: scale(1); opacity: 0.6; stroke-width: 16; } 60%, 100% { transform: scale(1.4); opacity: 0; stroke-width: 0; } }
                            @keyframes fade-v3 { 0%, 85% { opacity: 1; } 95%, 100% { opacity: 0; } }
                        </style>
                        <defs><mask id="mask-v3" maskUnits="userSpaceOnUse" x="-10" y="-10" width="120" height="120"><circle cx="50" cy="50" r="34" fill="none" stroke="#FFF" stroke-width="20" stroke-linecap="round" class="ring-v3" transform="rotate(-90 50 50)"/></mask></defs>
                        <g class="fade-v3">
                            <g mask="url(#mask-v3)">
                                <circle cx="50" cy="50" r="34" fill="none" stroke="#FFF" stroke-width="16" transform="translate(0, 4)"/>
                                <g transform="rotate(-90 50 50)"><circle cx="50" cy="50" r="34" fill="none" stroke="#FFAB91" stroke-width="16" stroke-linecap="round" stroke-dasharray="71.2 150" stroke-dashoffset="0"/><circle cx="50" cy="50" r="34" fill="none" stroke="#FFE082" stroke-width="16" stroke-linecap="round" stroke-dasharray="71.2 150" stroke-dashoffset="-71.2"/><circle cx="50" cy="50" r="34" fill="none" stroke="#80CBC4" stroke-width="16" stroke-linecap="round" stroke-dasharray="71.2 150" stroke-dashoffset="-142.4"/></g>
                            </g>
                            <!-- 波纹扩散层 -->
                            <circle cx="50" cy="50" r="34" fill="none" stroke="#81C784" class="ripple-v3"/>
                            <g class="check-v3">
                                <path d="M 26 52 L 44 68 L 76 30" fill="none" stroke="#FFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 4)"/><path d="M 26 52 L 44 68 L 76 30" fill="none" stroke="#FFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/><path d="M 26 52 L 44 68 L 76 30" fill="none" stroke="#81C784" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
                            </g>
                        </g>
                    </svg>